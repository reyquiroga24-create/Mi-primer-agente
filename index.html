<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Panel de Inteligencia Artificial</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #0f172a; /* Fondo azul oscuro elegante */
            color: #f8fafc; /* Letras blancas limpias */
            text-align: center; 
            padding: 80px 20px; 
        }
        h1 { 
            color: #38bdf8; /* Título color azul cielo brillante */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8; /* Texto secundario gris claro */
            font-size: 1.2rem;
        }
        button { 
            background-color: #0ea5e9; /* Botón azul llamativo */
            color: white;
            border: none; 
            padding: 15px 40px; 
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 50px; /* Bordes redondeados modernos */
            font-weight: bold;
            box-shadow: 0px 4px 15px rgba(14, 165, 233, 0.4); /* Sombra con brillo */
        }
        button:hover { 
            background-color: #0284c7; /* Cambia a azul más oscuro al pasar el dedo */
        }
    </style>
</head>
<body>

    <h1>🧠 Mi Agente de Negocios Locos</h1>
    <p>Esta página web se conectará con mi primer agente de IA Open Source.</p>
    <br><br>
    
    <button onclick="alert('¡Felicidades! Tu diseño CSS moderno está en vivo.')">
        Activar Agente de IA
    </button>

</body>
</html>
